<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adam's Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#12213a;
      --card:#1a2b47;
      --card2:#22385c;
      --border:#33527f;
      --text:#eef6ff;
      --muted:#a9bdd8;
      --accent:#7fb8ff;
      --accent2:#9acbff;
      --danger:#ff8ea1;
      --good:#8ff0c1;
      --warn:#ffd38a;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:"Inter",sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
    }

    .app{
      max-width:980px;
      margin:0 auto;
      padding:18px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:16px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .title h1{
      margin:0;
      font-size:1.35rem;
      font-weight:700;
    }

    .title p{
      margin:0;
      color:var(--muted);
      font-size:0.92rem;
    }

    .connect-btn{
      border:none;
      background:var(--accent);
      color:#08111d;
      font-weight:700;
      border-radius:14px;
      padding:12px 18px;
      cursor:pointer;
      font:inherit;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    .card{
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:1px solid var(--border);
      border-radius:20px;
      padding:16px;
      box-shadow:0 12px 30px rgba(0,0,0,0.18);
    }

    .card h2{
      margin:0 0 6px;
      font-size:1.05rem;
    }

    .sub{
      color:var(--muted);
      font-size:0.88rem;
      margin-bottom:14px;
    }

    .row{
      display:grid;
      gap:10px;
      margin-bottom:10px;
    }

    .row.two{
      grid-template-columns:repeat(2, minmax(0,1fr));
    }

    .row.three{
      grid-template-columns:repeat(3, minmax(0,1fr));
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:13px 12px;
      font:inherit;
      cursor:pointer;
      background:#2e4a74;
      color:var(--text);
      font-weight:600;
    }

    .btn:hover{
      filter:brightness(1.08);
    }

    .btn.primary{
      background:var(--accent);
      color:#08111d;
    }

    .btn.good{
      background:var(--good);
      color:#092116;
    }

    .btn.warn{
      background:var(--warn);
      color:#2c1d05;
    }

    .btn.danger{
      background:var(--danger);
      color:#31101a;
    }

    .inputs{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:10px;
      margin-bottom:10px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:0.82rem;
      color:var(--muted);
    }

    input{
      width:100%;
      border:1px solid var(--border);
      background:#10203a;
      color:var(--text);
      border-radius:12px;
      padding:12px;
      font:inherit;
      text-align:center;
      outline:none;
    }

    .status-box{
      margin-top:16px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:14px;
      color:var(--muted);
      line-height:1.5;
    }

    @media (max-width: 760px){
      .grid{
        grid-template-columns:1fr;
      }

      .row.two,
      .row.three,
      .inputs{
        grid-template-columns:1fr;
      }

      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .connect-btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">
        <h1>Adam's Room</h1>
        <p>cozy control center</p>
      </div>
      <button class="connect-btn" onclick="connectBT()">Connect</button>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Lamp</h2>
        <div class="sub">main lamp and timer</div>

        <div class="row two">
          <button class="btn primary" onclick="toggleLamp()">Lamp Toggle</button>
          <button class="btn" onclick="showCycleInfo()">Color Cycle Info</button>
        </div>

        <div class="inputs">
          <div class="field">
            <label>Hours</label>
            <input type="number" id="lampH" min="0" value="0">
          </div>
          <div class="field">
            <label>Minutes</label>
            <input type="number" id="lampM" min="0" value="0">
          </div>
          <div class="field">
            <label>Seconds</label>
            <input type="number" id="lampS" min="0" value="0">
          </div>
        </div>

        <div class="row two">
          <button class="btn good" onclick="setLampTimer('ON')">Turn On After</button>
          <button class="btn warn" onclick="setLampTimer('OFF')">Turn Off After</button>
        </div>
      </div>

      <div class="card">
        <h2>Buzzer</h2>
        <div class="sub">off, random reality checks, and alarm mode</div>

        <div class="row three">
          <button class="btn danger" onclick="setBuzzerMode('OFF')">Off</button>
          <button class="btn good" onclick="setBuzzerMode('RANDOM')">Reality Check</button>
          <button class="btn" onclick="testBuzzer()">Test</button>
        </div>

        <div class="inputs">
          <div class="field">
            <label>Hours</label>
            <input type="number" id="alarmH" min="0" value="0">
          </div>
          <div class="field">
            <label>Minutes</label>
            <input type="number" id="alarmM" min="0" value="5">
          </div>
          <div class="field">
            <label>Seconds</label>
            <input type="number" id="alarmS" min="0" value="0">
          </div>
        </div>

        <div class="row two">
          <button class="btn primary" onclick="armAlarm()">Arm Alarm</button>
          <button class="btn danger" onclick="stopAlarmOnly()">Stop Alarm</button>
        </div>
      </div>

      <div class="card">
        <h2>RGB Strip</h2>
        <div class="sub">colors and mixes</div>

        <div class="row three">
          <button class="btn" onclick="rgbSet('R')">Red</button>
          <button class="btn" onclick="rgbSet('G')">Green</button>
          <button class="btn" onclick="rgbSet('B')">Blue</button>
        </div>

        <div class="row three">
          <button class="btn" onclick="rgbSet('P')">Purple</button>
          <button class="btn" onclick="rgbSet('C')">Cyan</button>
          <button class="btn" onclick="rgbSet('Y')">Yellow</button>
        </div>

        <div class="row two">
          <button class="btn" onclick="rgbSet('W')">White</button>
          <button class="btn danger" onclick="rgbSet('OFF')">Off</button>
        </div>
      </div>

      <div class="card">
        <h2>TV</h2>
        <div class="sub">fast hold volume and power</div>

        <div class="row two">
          <button class="btn"
            onpointerdown="tvHoldStart('UP')"
            onpointerup="tvHoldStop()"
            onpointercancel="tvHoldStop()"
            onpointerleave="tvHoldStop()">Volume +</button>

          <button class="btn"
            onpointerdown="tvHoldStart('DOWN')"
            onpointerup="tvHoldStop()"
            onpointercancel="tvHoldStop()"
            onpointerleave="tvHoldStop()">Volume -</button>
        </div>

        <div class="row one">
          <button class="btn primary" onclick="tvSend('OC')">Power / Open-Close</button>
        </div>
      </div>
    </div>

    <div class="status-box">
      <div id="connectStatus">Not connected</div>
      <div id="statusBox">Ready.</div>
    </div>
  </div>

  <script>
    let btChar = null;
    let lampOn = true;
    let tvRepeatTimer = null;
    let tvBusy = false;

    function setStatus(text) {
      document.getElementById("statusBox").innerText = text;
    }

    function setConnectStatus(text) {
      document.getElementById("connectStatus").innerText = text;
    }

    async function connectBT() {
      const serviceUuid = "0000ffe0-0000-1000-8000-00805f9b34fb";
      const charUuid = "0000ffe1-0000-1000-8000-00805f9b34fb";

      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [serviceUuid] }]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(serviceUuid);
        btChar = await service.getCharacteristic(charUuid);

        try {
          await btChar.startNotifications();
          btChar.addEventListener("characteristicvaluechanged", (e) => {
            const val = new TextDecoder().decode(e.target.value).trim();

            if (val === "STATE:1") lampOn = true;
            if (val === "STATE:0") lampOn = false;

            if (val === "BUZALARM:ARMED") setStatus("Alarm armed.");
            else if (val === "BUZALARM:RINGING") setStatus("Alarm ringing.");
            else if (val === "BUZALARM:STOPPED") setStatus("Alarm stopped.");
          });
        } catch (_) {}

        setConnectStatus("Connected");
        setStatus("Connected to Adam's Room.");
      } catch (err) {
        setConnectStatus("Connection failed");
        setStatus("Could not connect.");
      }
    }

    async function send(msg) {
      if (!btChar) {
        setStatus("Connect first.");
        return;
      }
      await btChar.writeValue(new TextEncoder().encode(msg + "\n"));
    }

    function secondsFromInputs(hId, mId, sId) {
      const h = parseInt(document.getElementById(hId).value) || 0;
      const m = parseInt(document.getElementById(mId).value) || 0;
      const s = parseInt(document.getElementById(sId).value) || 0;
      return h * 3600 + m * 60 + s;
    }

    async function toggleLamp() {
      lampOn = !lampOn;
      await send(lampOn ? "1" : "0");
      setStatus(`Lamp ${lampOn ? "on" : "off"}.`);
    }

    function showCycleInfo() {
      setStatus("Lamp color cycle is controlled by the physical lamp button and IR button 0x45.");
    }

    async function setLampTimer(type) {
      const total = secondsFromInputs("lampH", "lampM", "lampS");
      if (total <= 0) {
        setStatus("Set a lamp timer first.");
        return;
      }
      await send(`${type}:${total}`);
      setStatus(`Lamp will turn ${type === "ON" ? "on" : "off"} in ${total} seconds.`);
    }

    async function setBuzzerMode(mode) {
      if (mode === "OFF") {
        await send("BUZ:0");
        setStatus("Buzzer off.");
      } else if (mode === "RANDOM") {
        await send("BUZ:1");
        setStatus("Reality-check mode enabled.");
      }
    }

    async function armAlarm() {
      const total = secondsFromInputs("alarmH", "alarmM", "alarmS");
      if (total <= 0) {
        setStatus("Set an alarm time first.");
        return;
      }
      await send(`BUZ:ALARM:${total}`);
      setStatus(`Alarm armed for ${total} seconds.`);
    }

    async function stopAlarmOnly() {
      await send("BUZ:ALARM:STOP");
      setStatus("Alarm stopped.");
    }

    async function testBuzzer() {
      await send("BUZ:TEST");
      setStatus("Test buzz sent.");
    }

    async function rgbSet(mode) {
      await send(`RGB:${mode}`);
      setStatus(`RGB set to ${mode}.`);
    }

    async function tvSend(which) {
      await send(`TV:${which}`);
      setStatus("TV command sent.");
    }

    async function tvHoldStart(dir) {
      await send(`TV:HOLD:${dir}`);

      if (tvRepeatTimer) clearInterval(tvRepeatTimer);

      tvRepeatTimer = setInterval(async () => {
        if (tvBusy) return;
        tvBusy = true;
        try {
          await send(`TV:HOLD:${dir}`);
        } finally {
          tvBusy = false;
        }
      }, 85);

      setStatus(`Holding TV volume ${dir}.`);
    }

    async function tvHoldStop() {
      if (tvRepeatTimer) {
        clearInterval(tvRepeatTimer);
        tvRepeatTimer = null;
      }

      await send("TV:HOLD:STOP");
      setStatus("TV hold stopped.");
    }
  </script>
</body>
</html>
