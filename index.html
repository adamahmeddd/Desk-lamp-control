<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adam's Room | Cosmic Control</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --glow: #00d4ff;
      --space-bg: #020617;
      --glass: rgba(15, 23, 42, 0.7);
      --nebula: linear-gradient(45deg, #1e1b4b, #312e81, #1e1b4b);
    }
    body {
      margin: 0; padding: 0;
      background: var(--space-bg);
      color: white; font-family: 'Quicksand', sans-serif;
      display:flex; justify-content:center; align-items:center;
      min-height:100vh; overflow:hidden;
    }
    .stars-container { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--nebula); z-index:-1; }
    .star { position:absolute; background:white; border-radius:50%; opacity:0.5; animation: twinkle var(--duration) infinite ease-in-out; }
    @keyframes twinkle { 0%,100%{opacity:0.3; transform:scale(1);} 50%{opacity:1; transform:scale(1.2);} }

    .card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 2.5rem;
      width: 380px;
      text-align:center;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    h1 { font-weight:300; letter-spacing:8px; font-size:1.05rem; margin-bottom:1.25rem; background:linear-gradient(to right,#fff,var(--glow)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

    .nova-button { width:120px; height:120px; border-radius:50%; border:none; background:#0f172a; cursor:pointer; font-size:2.5rem; margin-bottom:1rem; box-shadow: inset 0 0 20px rgba(255,255,255,0.05); }
    .nova-button.active { background:#fff; transform:scale(1.05); }

    .timer-hud { background: rgba(255,255,255,0.03); border-radius:20px; padding:1rem; border:1px solid rgba(255,255,255,0.05); }
    .input-row { display:flex; justify-content:center; gap:12px; margin:12px 0; }
    .unit { display:flex; flex-direction:column; }
    input { width:60px; height:42px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:var(--glow); text-align:center; font-size:1rem; outline:none; }
    label { font-size:0.6rem; color:#64748b; margin-top:6px; text-transform:uppercase; }

    .btn-row { display:flex; gap:10px; margin-top:8px; }
    button.dream-btn {
      flex:1; padding:10px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.1); background:transparent;
      color:white; cursor:pointer; font-size:0.8rem; letter-spacing:1px;
    }
    button.dream-btn:hover { background: rgba(255,255,255,0.06); border-color:var(--glow); color:var(--glow); }

    .section-title { margin:12px 0 6px; font-size:0.65rem; color:#64748b; text-transform:uppercase; text-align:left; }

    #status, #statusTv { margin-top:1rem; font-size:0.75rem; color:#a2b0c7; letter-spacing:1px; }
    #connect-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:var(--space-bg); border-radius:40px; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; }
  </style>
</head>
<body>

  <div class="stars-container" id="stars"></div>

  <div class="card">
    <div id="connect-overlay">
      <h1>Adam's Room</h1>
      <button class="dream-btn" style="max-width:200px" onclick="connectBT()">INITIALIZE LINK</button>
    </div>

    <div id="mainMode">
      <h1>Adam's Room</h1>

      <button class="nova-button" id="lampBtn" onclick="toggleLamp()">✨</button>

      <div class="timer-hud">
        <div class="input-row">
          <div class="unit"><input type="number" id="hh" value="0"><label>Hours</label></div>
          <div class="unit"><input type="number" id="mm" value="0"><label>Min</label></div>
          <div class="unit"><input type="number" id="ss" value="0"><label>Sec</label></div>
        </div>

        <div class="btn-row">
          <button class="dream-btn" onclick="setTimer('ON')">TIMED ON</button>
          <button class="dream-btn" onclick="setTimer('OFF')">TIMED OFF</button>
        </div>

        <div class="section-title">Buzzer</div>
        <div class="btn-row">
          <button class="dream-btn" id="buzToggle" onclick="toggleBuzzer()">BUZZER ON</button>
          <button class="dream-btn" onclick="testBuzzer()">TEST BUZZ</button>
        </div>

        <div class="input-row" style="margin-top:10px;">
          <div class="unit"><input type="number" id="ahh" value="0"><label>Alarm H</label></div>
          <div class="unit"><input type="number" id="amm" value="0"><label>Alarm M</label></div>
          <div class="unit"><input type="number" id="ass" value="0"><label>Alarm S</label></div>
        </div>

        <div class="btn-row">
          <button class="dream-btn" onclick="armAlarm()">ALARM MODE</button>
          <!-- STOP ALARM button removed as requested -->
        </div>

        <div class="section-title">TV</div>
        <div class="btn-row">
          <button class="dream-btn" onclick="openTVMode()">TV MODE</button>
        </div>
      </div>

      <p id="status">SYSTEM IDLE</p>
    </div>

    <div id="tvMode" style="display:none;">
      <h1>TV Control</h1>

      <div class="timer-hud">
        <div class="btn-row">
          <button class="dream-btn"
            onpointerdown="tvHoldStart('UP')"
            onpointerup="tvHoldStop()"
            onpointercancel="tvHoldStop()"
            onpointerleave="tvHoldStop()">VOLUME +</button>

          <button class="dream-btn"
            onpointerdown="tvHoldStart('DOWN')"
            onpointerup="tvHoldStop()"
            onpointercancel="tvHoldStop()"
            onpointerleave="tvHoldStop()">VOLUME -</button>
        </div>

        <div class="btn-row" style="margin-top:8px;">
          <button class="dream-btn" onclick="tvSend('OC')">OPEN / CLOSE</button>
        </div>

        <div class="btn-row" style="margin-top:8px;">
          <button class="dream-btn" onclick="closeTVMode()">BACK</button>
        </div>
      </div>

      <p id="statusTv">TV SYSTEM READY</p>
    </div>
  </div>

<script>
  // background stars (cosmetic)
  const starsContainer = document.getElementById('stars');
  for (let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*3 + 'px';
    s.style.width = s.style.height = size;
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.setProperty('--duration', Math.random()*3 + 2 + 's');
    starsContainer.appendChild(s);
  }

  let btChar = null;
  let isOn = true;
  let buzzerEnabledUI = true;

  function updateBuzzerButton(){ document.getElementById('buzToggle').innerText = buzzerEnabledUI ? 'BUZZER ON' : 'BUZZER OFF'; }

  async function connectBT() {
    const serviceUuid = "0000ffe0-0000-1000-8000-00805f9b34fb";
    const charUuid = "0000ffe1-0000-1000-8000-00805f9b34fb";
    try {
      const device = await navigator.bluetooth.requestDevice({ filters:[{services:[serviceUuid]}] });
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(serviceUuid);
      btChar = await service.getCharacteristic(charUuid);

      try {
        await btChar.startNotifications();
        btChar.addEventListener('characteristicvaluechanged', (e)=>{
          let val = new TextDecoder().decode(e.target.value).trim();
          if (val === "STATE:1") updateUI(true);
          if (val === "STATE:0") updateUI(false);
          if (val === "BUZ:1") { buzzerEnabledUI = true; updateBuzzerButton(); }
          if (val === "BUZ:0") { buzzerEnabledUI = false; updateBuzzerButton(); }
          if (val === "BUZALARM:ARMED") document.getElementById('status').innerText = "ALARM ARMED";
          if (val === "BUZALARM:RINGING") document.getElementById('status').innerText = "ALARM RINGING";
        });
      } catch(_) {}

      document.getElementById('connect-overlay').style.display='none';
      updateUI(true);
      updateBuzzerButton();
    } catch (err) { alert('Initialization failed: ' + err); }
  }

  async function send(msg){
    if (!btChar) return;
    await btChar.writeValue(new TextEncoder().encode(msg + "\n"));
  }

  // Lamp
  function toggleLamp(){
    isOn = !isOn;
    send(isOn ? "1" : "0");
    updateUI(isOn);
  }
  function updateUI(state){
    isOn = state;
    const btn = document.getElementById('lampBtn');
    const status = document.getElementById('status');
    if (isOn) { btn.classList.add('active'); btn.innerHTML = "☀️"; status.innerText = "SYSTEM ACTIVE • EMITTING LIGHT"; }
    else { btn.classList.remove('active'); btn.innerHTML = "🌑"; status.innerText = "SYSTEM IDLE • ENERGY SAVED"; }
  }

  function setTimer(type){
    const h = parseInt(document.getElementById('hh').value) || 0;
    const m = parseInt(document.getElementById('mm').value) || 0;
    const s = parseInt(document.getElementById('ss').value) || 0;
    const total = (h*3600)+(m*60)+s;
    if (total <= 0) return;
    send(`${type}:${total}`);
    document.getElementById('status').innerText = `T-MINUS ${total}s UNTIL ${type}`;
  }

  // Buzzer
  async function toggleBuzzer(){
    buzzerEnabledUI = !buzzerEnabledUI;
    await send(buzzerEnabledUI ? "BUZ:1" : "BUZ:0");
    updateBuzzerButton();
  }

  async function testBuzzer(){
    await send("BUZ:TEST");
  }

  async function armAlarm(){
    const h = parseInt(document.getElementById('ahh').value) || 0;
    const m = parseInt(document.getElementById('amm').value) || 0;
    const s = parseInt(document.getElementById('ass').value) || 0;
    const total = (h*3600)+(m*60)+s;
    if (total <= 0) return;
    await send(`BUZ:ALARM:${total}`);
    document.getElementById('status').innerText = `ALARM IN ${total}s`;
  }

  // TV
  function openTVMode(){ document.getElementById('mainMode').style.display='none'; document.getElementById('tvMode').style.display='block'; }
  function closeTVMode(){ tvHoldStop(); document.getElementById('tvMode').style.display='none'; document.getElementById('mainMode').style.display='block'; }

  async function tvSend(which){
    await send(`TV:${which}`);
    const st = document.getElementById('statusTv'); if (st) st.innerText = `TV COMMAND SENT • ${which}`;
  }

  async function tvHoldStart(dir){
    await send(`TV:HOLD:${dir}`);
    const st = document.getElementById('statusTv'); if (st) st.innerText = `TV HOLD • VOLUME ${dir}`;
  }

  async function tvHoldStop(){
    await send('TV:HOLD:STOP');
    const st = document.getElementById('statusTv'); if (st) st.innerText = `TV HOLD STOPPED`;
  }

</script>
</body>
</html>
