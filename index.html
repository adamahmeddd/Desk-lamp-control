<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Home Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #0d1020;
      --bg2: #171a2f;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.14);
      --text: #eef2ff;
      --muted: #aeb6d8;
      --accent: #c8b6ff;
      --accent2: #8ec5ff;
      --good: #9effc7;
      --shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(200,182,255,0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(142,197,255,0.16), transparent 28%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow: auto;
    }

    .wrap {
      width: min(720px, calc(100vw - 24px));
      margin: 24px auto;
      padding-bottom: 24px;
    }

    .hero {
      padding: 20px 18px 8px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      padding: 18px;
      margin: 14px 0;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .row.full {
      grid-template-columns: 1fr;
    }

    .label {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0 0 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 12px;
      font: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover, .btn:active {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.1);
    }

    .btn.primary {
      background: linear-gradient(135deg, rgba(200,182,255,0.28), rgba(142,197,255,0.2));
      border-color: rgba(200,182,255,0.36);
    }

    .btn.good {
      background: rgba(158,255,199,0.12);
      border-color: rgba(158,255,199,0.22);
    }

    .btn.warn {
      background: rgba(255,205,130,0.12);
      border-color: rgba(255,205,130,0.22);
    }

    .btn.danger {
      background: rgba(255,140,160,0.12);
      border-color: rgba(255,140,160,0.22);
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 10px 0 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field span {
      font-size: 0.78rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 14px;
      padding: 12px;
      font: inherit;
      text-align: center;
      outline: none;
    }

    .status {
      margin-top: 14px;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .connect {
      position: sticky;
      top: 12px;
      z-index: 10;
    }

    @media (max-width: 600px) {
      .row, .row.three, .inputs {
        grid-template-columns: 1fr;
      }
      .hero h1 {
        font-size: 1.45rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="connect panel">
      <div class="label">Connection</div>
      <div class="row full">
        <button class="btn primary" onclick="connectBT()">Connect Device</button>
      </div>
      <div class="status" id="connectStatus">Not connected</div>
    </div>

    <div class="hero">
      <h1>Quiet Focus Control</h1>
      <p>Clean control for lamp, TV, buzzer modes, and RGB light. Designed to scroll smoothly and stay light.</p>
    </div>

    <div class="panel">
      <div class="label">Lamp</div>
      <div class="row">
        <button class="btn primary" id="lampBtn" onclick="toggleLamp()">Lamp Toggle</button>
        <button class="btn" onclick="cycleLampModeFromApp()">Lamp / Color Cycle</button>
      </div>

      <div class="label" style="margin-top:14px;">Lamp Timer</div>
      <div class="inputs">
        <div class="field">
          <span>Hours</span>
          <input type="number" id="lampH" min="0" value="0">
        </div>
        <div class="field">
          <span>Minutes</span>
          <input type="number" id="lampM" min="0" value="0">
        </div>
        <div class="field">
          <span>Seconds</span>
          <input type="number" id="lampS" min="0" value="0">
        </div>
      </div>

      <div class="row">
        <button class="btn good" onclick="setLampTimer('ON')">Turn On After</button>
        <button class="btn warn" onclick="setLampTimer('OFF')">Turn Off After</button>
      </div>
    </div>

    <div class="panel">
      <div class="label">Buzzer</div>
      <div class="row three">
        <button class="btn danger" onclick="setBuzzerMode('OFF')">Off</button>
        <button class="btn good" onclick="setBuzzerMode('RANDOM')">Reality Check</button>
        <button class="btn primary" onclick="armAlarm()">Alarm Mode</button>
      </div>

      <div class="label" style="margin-top:14px;">Alarm Countdown</div>
      <div class="inputs">
        <div class="field">
          <span>Hours</span>
          <input type="number" id="alarmH" min="0" value="0">
        </div>
        <div class="field">
          <span>Minutes</span>
          <input type="number" id="alarmM" min="0" value="5">
        </div>
        <div class="field">
          <span>Seconds</span>
          <input type="number" id="alarmS" min="0" value="0">
        </div>
      </div>

      <div class="row">
        <button class="btn" onclick="testBuzzer()">Test Buzz</button>
        <button class="btn danger" onclick="setBuzzerMode('OFF')">Stop Alarm / Off</button>
      </div>
    </div>

    <div class="panel">
      <div class="label">RGB Strip</div>
      <div class="row three">
        <button class="btn" onclick="rgbSet('R')">Red</button>
        <button class="btn" onclick="rgbSet('G')">Green</button>
        <button class="btn" onclick="rgbSet('B')">Blue</button>
      </div>
      <div class="row three" style="margin-top:10px;">
        <button class="btn" onclick="rgbSet('P')">Purple</button>
        <button class="btn" onclick="rgbSet('C')">Cyan</button>
        <button class="btn" onclick="rgbSet('Y')">Yellow</button>
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="btn" onclick="rgbSet('W')">White</button>
        <button class="btn danger" onclick="rgbSet('OFF')">Off</button>
      </div>
    </div>

    <div class="panel">
      <div class="label">TV</div>
      <div class="row">
        <button class="btn"
          onpointerdown="tvHoldStart('UP')"
          onpointerup="tvHoldStop()"
          onpointercancel="tvHoldStop()"
          onpointerleave="tvHoldStop()">Volume +</button>

        <button class="btn"
          onpointerdown="tvHoldStart('DOWN')"
          onpointerup="tvHoldStop()"
          onpointercancel="tvHoldStop()"
          onpointerleave="tvHoldStop()">Volume -</button>
      </div>

      <div class="row full" style="margin-top:10px;">
        <button class="btn" onclick="tvSend('OC')">Power / Open-Close</button>
      </div>
    </div>

    <div class="panel">
      <div class="label">Status</div>
      <div class="status" id="statusBox">Ready.</div>
    </div>
  </div>

  <script>
    let btChar = null;
    let lampOn = true;
    let buzzerMode = "RANDOM";

    function setStatus(text) {
      document.getElementById("statusBox").innerText = text;
    }

    function setConnectStatus(text) {
      document.getElementById("connectStatus").innerText = text;
    }

    async function connectBT() {
      const serviceUuid = "0000ffe0-0000-1000-8000-00805f9b34fb";
      const charUuid = "0000ffe1-0000-1000-8000-00805f9b34fb";

      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [serviceUuid] }]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(serviceUuid);
        btChar = await service.getCharacteristic(charUuid);

        try {
          await btChar.startNotifications();
          btChar.addEventListener("characteristicvaluechanged", (e) => {
            const val = new TextDecoder().decode(e.target.value).trim();

            if (val === "STATE:1") lampOn = true;
            if (val === "STATE:0") lampOn = false;

            if (val === "BUZMODE:OFF") buzzerMode = "OFF";
            if (val === "BUZMODE:RANDOM") buzzerMode = "RANDOM";
            if (val === "BUZMODE:ALARM") buzzerMode = "ALARM";

            if (val === "BUZALARM:ARMED") setStatus("Alarm armed.");
            else if (val === "BUZALARM:RINGING") setStatus("Alarm ringing.");
            else if (val === "BUZALARM:STOPPED") setStatus("Alarm stopped.");
          });
        } catch (_) {}

        setConnectStatus("Connected");
        setStatus("Device connected.");
      } catch (err) {
        setConnectStatus("Connection failed");
        setStatus("Could not connect.");
      }
    }

    async function send(msg) {
      if (!btChar) {
        setStatus("Connect first.");
        return;
      }
      await btChar.writeValue(new TextEncoder().encode(msg + "\n"));
    }

    function secondsFromInputs(hId, mId, sId) {
      const h = parseInt(document.getElementById(hId).value) || 0;
      const m = parseInt(document.getElementById(mId).value) || 0;
      const s = parseInt(document.getElementById(sId).value) || 0;
      return h * 3600 + m * 60 + s;
    }

    async function toggleLamp() {
      lampOn = !lampOn;
      await send(lampOn ? "1" : "0");
      setStatus(`Lamp ${lampOn ? "on" : "off"}.`);
    }

    async function cycleLampModeFromApp() {
      // Reuse existing cycle by sending the same IR-style behavior is not available over BT,
      // so for app we mimic the physical cycle with RGB + lamp states not tracked.
      // Clean fallback: move through the same sequence visually on hardware with a dedicated BT command not currently present.
      // Since your original system doesn't have a BT cycle command, this keeps old features untouched.
      setStatus("Lamp/color cycle is available from the physical lamp button and IR button 0x45.");
    }

    async function setLampTimer(type) {
      const total = secondsFromInputs("lampH", "lampM", "lampS");
      if (total <= 0) {
        setStatus("Set a lamp timer first.");
        return;
      }
      await send(`${type}:${total}`);
      setStatus(`Lamp will turn ${type === "ON" ? "on" : "off"} in ${total} seconds.`);
    }

    async function setBuzzerMode(mode) {
      if (mode === "OFF") {
        buzzerMode = "OFF";
        await send("BUZ:0");
        setStatus("Buzzer off. Alarm and random mode stopped.");
      } else if (mode === "RANDOM") {
        buzzerMode = "RANDOM";
        await send("BUZ:1");
        setStatus("Reality-check random mode enabled.");
      }
    }

    async function armAlarm() {
      const total = secondsFromInputs("alarmH", "alarmM", "alarmS");
      if (total <= 0) {
        setStatus("Set an alarm countdown first.");
        return;
      }
      buzzerMode = "ALARM";
      await send(`BUZ:ALARM:${total}`);
      setStatus(`Alarm armed for ${total} seconds from now.`);
    }

    async function testBuzzer() {
      await send("BUZ:TEST");
      setStatus("Test buzz sent.");
    }

    async function rgbSet(mode) {
      await send(`RGB:${mode}`);
      setStatus(`RGB set to ${mode}.`);
    }

    async function tvSend(which) {
      await send(`TV:${which}`);
      setStatus("TV command sent.");
    }

    async function tvHoldStart(dir) {
      await send(`TV:HOLD:${dir}`);
      setStatus(`Holding TV volume ${dir}.`);
    }

    async function tvHoldStop() {
      await send("TV:HOLD:STOP");
      setStatus("TV hold stopped.");
    }
  </script>
</body>
</html>
