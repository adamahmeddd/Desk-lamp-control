<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adam's Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#08101f;
      --bg2:#101a30;
      --bg3:#142542;
      --card:rgba(255,255,255,0.08);
      --card-border:rgba(255,255,255,0.14);
      --text:#eef4ff;
      --muted:#a8b6d8;
      --glow:#8fc7ff;
      --glow2:#c6b2ff;
      --shadow:0 20px 50px rgba(0,0,0,0.32);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:"Manrope",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 18%, rgba(198,178,255,0.16), transparent 22%),
        radial-gradient(circle at 82% 14%, rgba(143,199,255,0.15), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(120,170,255,0.10), transparent 35%),
        linear-gradient(160deg, var(--bg1), var(--bg2) 45%, var(--bg3));
    }

    .stars{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .star{
      position:absolute;
      width:2px;
      height:2px;
      border-radius:50%;
      background:rgba(255,255,255,0.7);
      animation:twinkle var(--d) infinite ease-in-out;
    }

    @keyframes twinkle{
      0%,100%{opacity:.18;transform:scale(1)}
      50%{opacity:.95;transform:scale(1.6)}
    }

    .app{
      position:relative;
      width:min(1100px, calc(100vw - 24px));
      height:min(760px, calc(100vh - 24px));
      margin:12px auto;
      padding:14px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
    }

    .topbar, .footerbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:22px;
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
      padding:14px 16px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .brand h1{
      margin:0;
      font-size:1.35rem;
      font-weight:700;
      letter-spacing:.02em;
    }

    .brand p{
      margin:0;
      color:var(--muted);
      font-size:.9rem;
    }

    .connect-btn, .mini-btn{
      appearance:none;
      border:none;
      cursor:pointer;
      color:var(--text);
      border-radius:16px;
      padding:12px 16px;
      font:inherit;
      background:linear-gradient(135deg, rgba(143,199,255,0.20), rgba(198,178,255,0.18));
      border:1px solid rgba(255,255,255,0.12);
      transition:.18s ease;
    }

    .connect-btn:hover, .mini-btn:hover{
      transform:translateY(-1px);
      background:linear-gradient(135deg, rgba(143,199,255,0.26), rgba(198,178,255,0.22));
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      grid-auto-rows:minmax(150px, 1fr);
      gap:12px;
      min-height:0;
    }

    .tile{
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.11);
      border-radius:28px;
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
    }

    .tile.big{
      grid-column:span 2;
      grid-row:span 2;
    }

    .tile.wide{
      grid-column:span 2;
    }

    .icon{
      font-size:1.6rem;
      opacity:.95;
    }

    .tile-title{
      font-size:1rem;
      font-weight:700;
    }

    .tile-sub{
      font-size:.84rem;
      color:var(--muted);
      line-height:1.4;
    }

    .controls{
      display:grid;
      gap:10px;
      min-height:0;
    }

    .controls.two{grid-template-columns:repeat(2, minmax(0,1fr))}
    .controls.three{grid-template-columns:repeat(3, minmax(0,1fr))}
    .controls.one{grid-template-columns:1fr}

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      color:var(--text);
      border-radius:18px;
      padding:14px 12px;
      font:inherit;
      font-size:.95rem;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.11);
      transition:.18s ease;
      min-width:0;
    }

    .btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,0.10);
    }

    .btn.primary{
      background:linear-gradient(135deg, rgba(143,199,255,0.22), rgba(198,178,255,0.18));
    }

    .btn.danger{
      background:rgba(255,120,150,0.10);
    }

    .btn.good{
      background:rgba(130,255,210,0.10);
    }

    .btn.warn{
      background:rgba(255,210,120,0.10);
    }

    .inputs{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:10px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .field span{
      font-size:.76rem;
      color:var(--muted);
      text-align:center;
    }

    input{
      width:100%;
      border:none;
      outline:none;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.10);
      color:var(--text);
      border-radius:16px;
      padding:12px;
      text-align:center;
      font:inherit;
    }

    .statusline{
      color:var(--muted);
      font-size:.92rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .small{
      font-size:.82rem;
      color:var(--muted);
    }

    @media (max-width: 980px){
      .app{
        height:calc(100vh - 16px);
        width:calc(100vw - 16px);
        margin:8px auto;
        padding:8px;
      }
      .grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        grid-auto-rows:minmax(140px, 1fr);
      }
      .tile.big, .tile.wide{
        grid-column:span 2;
      }
    }

    @media (max-width: 620px){
      .grid{
        grid-template-columns:1fr 1fr;
      }
      .inputs{
        grid-template-columns:1fr;
      }
      .topbar,.footerbar{
        padding:12px;
      }
      .brand h1{
        font-size:1.12rem;
      }
      .brand p{
        font-size:.82rem;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <h1>Adam's Room</h1>
        <p>cozy control • lamp • rgb • tv • buzzer</p>
      </div>
      <button class="connect-btn" onclick="connectBT()">Connect</button>
    </div>

    <div class="grid">
      <div class="tile big">
        <div class="icon">✨</div>
        <div class="tile-title">Lamp</div>
        <div class="tile-sub">main light and timed control</div>

        <div class="controls two">
          <button class="btn primary" id="lampBtn" onclick="toggleLamp()">Lamp Toggle</button>
          <button class="btn" onclick="setLampCycleInfo()">Color Cycle</button>
        </div>

        <div class="inputs">
          <div class="field">
            <span>Hours</span>
            <input type="number" id="lampH" min="0" value="0">
          </div>
          <div class="field">
            <span>Minutes</span>
            <input type="number" id="lampM" min="0" value="0">
          </div>
          <div class="field">
            <span>Seconds</span>
            <input type="number" id="lampS" min="0" value="0">
          </div>
        </div>

        <div class="controls two">
          <button class="btn good" onclick="setLampTimer('ON')">Turn On After</button>
          <button class="btn warn" onclick="setLampTimer('OFF')">Turn Off After</button>
        </div>
      </div>

      <div class="tile">
        <div class="icon">🛌</div>
        <div class="tile-title">Buzzer</div>
        <div class="tile-sub">off • lucid checks • alarm</div>

        <div class="controls one">
          <button class="btn danger" onclick="setBuzzerMode('OFF')">Off</button>
          <button class="btn good" onclick="setBuzzerMode('RANDOM')">Reality Check</button>
          <button class="btn" onclick="testBuzzer()">Test</button>
        </div>
      </div>

      <div class="tile">
        <div class="icon">⏰</div>
        <div class="tile-title">Alarm</div>
        <div class="tile-sub">countdown ring mode</div>

        <div class="inputs">
          <div class="field">
            <span>Hours</span>
            <input type="number" id="alarmH" min="0" value="0">
          </div>
          <div class="field">
            <span>Minutes</span>
            <input type="number" id="alarmM" min="0" value="5">
          </div>
          <div class="field">
            <span>Seconds</span>
            <input type="number" id="alarmS" min="0" value="0">
          </div>
        </div>

        <div class="controls two">
          <button class="btn primary" onclick="armAlarm()">Arm Alarm</button>
          <button class="btn danger" onclick="stopAlarmOnly()">Stop Alarm</button>
        </div>
      </div>

      <div class="tile wide">
        <div class="icon">🌈</div>
        <div class="tile-title">RGB Strip</div>
        <div class="tile-sub">single colors and mixes</div>

        <div class="controls three">
          <button class="btn" onclick="rgbSet('R')">Red</button>
          <button class="btn" onclick="rgbSet('G')">Green</button>
          <button class="btn" onclick="rgbSet('B')">Blue</button>
        </div>
        <div class="controls three">
          <button class="btn" onclick="rgbSet('P')">Purple</button>
          <button class="btn" onclick="rgbSet('C')">Cyan</button>
          <button class="btn" onclick="rgbSet('Y')">Yellow</button>
        </div>
        <div class="controls two">
          <button class="btn" onclick="rgbSet('W')">White</button>
          <button class="btn danger" onclick="rgbSet('OFF')">Off</button>
        </div>
      </div>

      <div class="tile wide">
        <div class="icon">📺</div>
        <div class="tile-title">TV</div>
        <div class="tile-sub">fast hold volume and power</div>

        <div class="controls two">
          <button class="btn"
            onpointerdown="tvHoldPress('UP')"
            onpointerup="tvHoldRelease()"
            onpointercancel="tvHoldRelease()"
            onpointerleave="tvHoldRelease()">Volume +</button>

          <button class="btn"
            onpointerdown="tvHoldPress('DOWN')"
            onpointerup="tvHoldRelease()"
            onpointercancel="tvHoldRelease()"
            onpointerleave="tvHoldRelease()">Volume -</button>
        </div>

        <div class="controls one">
          <button class="btn" onclick="tvSend('OC')">Power / Open-Close</button>
        </div>
      </div>
    </div>

    <div class="footerbar">
      <div class="statusline" id="connectStatus">Not connected</div>
      <div class="statusline" id="statusBox">Ready.</div>
    </div>
  </div>

  <script>
    // background stars
    const stars = document.getElementById("stars");
    for (let i = 0; i < 90; i++) {
      const s = document.createElement("div");
      s.className = "star";
      s.style.left = Math.random() * 100 + "%";
      s.style.top = Math.random() * 100 + "%";
      s.style.setProperty("--d", (2 + Math.random() * 4) + "s");
      stars.appendChild(s);
    }

    let btChar = null;
    let lampOn = true;
    let tvRepeatTimer = null;
    let tvHeldDirection = null;

    function setStatus(text) {
      document.getElementById("statusBox").innerText = text;
    }

    function setConnectStatus(text) {
      document.getElementById("connectStatus").innerText = text;
    }

    async function connectBT() {
      const serviceUuid = "0000ffe0-0000-1000-8000-00805f9b34fb";
      const charUuid = "0000ffe1-0000-1000-8000-00805f9b34fb";

      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [serviceUuid] }]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(serviceUuid);
        btChar = await service.getCharacteristic(charUuid);

        try {
          await btChar.startNotifications();
          btChar.addEventListener("characteristicvaluechanged", (e) => {
            const val = new TextDecoder().decode(e.target.value).trim();

            if (val === "STATE:1") lampOn = true;
            if (val === "STATE:0") lampOn = false;

            if (val === "BUZALARM:ARMED") setStatus("Alarm armed.");
            else if (val === "BUZALARM:RINGING") setStatus("Alarm ringing.");
            else if (val === "BUZALARM:STOPPED") setStatus("Alarm stopped.");
          });
        } catch (_) {}

        setConnectStatus("Connected");
        setStatus("Connected to Adam's Room.");
      } catch (err) {
        setConnectStatus("Connection failed");
        setStatus("Could not connect.");
      }
    }

    async function send(msg) {
      if (!btChar) {
        setStatus("Connect first.");
        return;
      }
      await btChar.writeValue(new TextEncoder().encode(msg + "\n"));
    }

    function secondsFromInputs(hId, mId, sId) {
      const h = parseInt(document.getElementById(hId).value) || 0;
      const m = parseInt(document.getElementById(mId).value) || 0;
      const s = parseInt(document.getElementById(sId).value) || 0;
      return h * 3600 + m * 60 + s;
    }

    async function toggleLamp() {
      lampOn = !lampOn;
      await send(lampOn ? "1" : "0");
      setStatus(`Lamp ${lampOn ? "on" : "off"}.`);
    }

    function setLampCycleInfo() {
      setStatus("Use the physical lamp button or IR 0x45 for the full color cycle.");
    }

    async function setLampTimer(type) {
      const total = secondsFromInputs("lampH", "lampM", "lampS");
      if (total <= 0) {
        setStatus("Set a lamp timer first.");
        return;
      }
      await send(`${type}:${total}`);
      setStatus(`Lamp will turn ${type === "ON" ? "on" : "off"} in ${total}s.`);
    }

    async function setBuzzerMode(mode) {
      if (mode === "OFF") {
        await send("BUZ:0");
        setStatus("Buzzer off.");
      } else if (mode === "RANDOM") {
        await send("BUZ:1");
        setStatus("Reality-check mode on.");
      }
    }

    async function armAlarm() {
      const total = secondsFromInputs("alarmH", "alarmM", "alarmS");
      if (total <= 0) {
        setStatus("Set an alarm time first.");
        return;
      }
      await send(`BUZ:ALARM:${total}`);
      setStatus(`Alarm armed for ${total}s.`);
    }

    async function stopAlarmOnly() {
      await send("BUZ:ALARM:STOP");
      setStatus("Alarm stopped.");
    }

    async function testBuzzer() {
      await send("BUZ:TEST");
      setStatus("Test buzz sent.");
    }

    async function rgbSet(mode) {
      await send(`RGB:${mode}`);
      setStatus(`RGB set: ${mode}.`);
    }

    async function tvSend(which) {
      await send(`TV:${which}`);
      setStatus("TV command sent.");
    }

    async function tvHoldPress(dir) {
      tvHeldDirection = dir;

      // tell arduino to enter hold mode immediately
      await send(`TV:HOLD:${dir}`);

      // ALSO keep refreshing from app side to preserve the old fast feel
      if (tvRepeatTimer) clearInterval(tvRepeatTimer);
      tvRepeatTimer = setInterval(() => {
        send(`TV:HOLD:${dir}`);
      }, 90);

      setStatus(`Holding volume ${dir.toLowerCase()}.`);
    }

    async function tvHoldRelease() {
      if (tvRepeatTimer) {
        clearInterval(tvRepeatTimer);
        tvRepeatTimer = null;
      }
      tvHeldDirection = null;
      await send("TV:HOLD:STOP");
      setStatus("TV hold stopped.");
    }
  </script>
</body>
</html>
